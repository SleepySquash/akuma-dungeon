name: akuma
description: Rogue-like dungeon clicker game.
publish_to: "none"
version: 0.1.0-alpha.1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  badges: ^3.2.0
  bordered_text: ^3.0.0
  collection: ^1.16.0
  decimal: ^3.2.4
  fluent: ^2.0.3
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  get: ^4.6.5
  google_fonts: ^8.1.0
  hive_ce: ^2.19.3
  js: ^0.6.4
  media_kit: ^1.1.10+1
  media_kit_libs_audio: ^1.0.7
  mutex: ^3.0.0
  log_me: ^0.1.2
  novel:
    git: https://github.com/lapuske/novel.git
  page_transition: ^2.0.5
  path_provider: ^2.0.10
  sliding_up_panel2: ^3.2.2
  timezone: ^0.11.1
  universal_io: ^2.0.4
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.1.10
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.11.2

dependency_overrides:
  analyzer: ^12.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/background/location/
    - assets/background/misc/
    - assets/background/room/
    - assets/character/
    - assets/font/
    - assets/item/artifact/adventurer/
    - assets/item/artifact/initiate/
    - assets/item/artifact/lucky_dog/
    - assets/item/consumable/
    - assets/item/equipable/
    - assets/item/misc/
    - assets/item/resource/
    - assets/item/skill/
    - assets/item/weapon/
    - assets/l10n/
    - assets/monster/construction/
    - assets/monster/delivery/
    - assets/monster/slime/
    - assets/monster/special/
    - assets/monster/veggies/
    - assets/music/
    - assets/skill/
    - assets/sound/
    - assets/sprite/
    - assets/voice/darknightprincess/
    - assets/voice/intro/
    - assets/voice/Rozzi/
    - assets/voice/sfx/
